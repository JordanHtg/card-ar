<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>AR Business Card</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- AR.js for A-Frame -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- A-Frame Extras (for GLTF Animation) -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
  </head>
  
  <body style="margin: 0; overflow: hidden;">
    
    <!-- UI Overlay while scanning -->
    <div id="ui-container">
      <div class="scan-frame">
        <p>POINT CAMERA AT BUSINESS CARD</p>
      </div>
    </div>

    <!-- AR Scene -->
    <a-scene 
      embedded 
      arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
      renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;"
      vr-mode-ui="enabled: false">
      
      <a-assets>
        <!-- Profile Picture -->
        <img id="avatar" src="profile.jpg" crossorigin="anonymous">
        
        <!-- Video/Portfolio Placeholder -->
        <video id="portfolio" src="video-banner.mp4" autoplay loop muted crossorigin="anonymous" playsinline webkit-playsinline></video>
        
        <!-- Background Music -->
        <audio id="bgm" src="Fein.mp3" loop preload="auto" crossorigin="anonymous"></audio>
        
        <!-- Buttons Background -->
        <img id="btn-bg" src="https://upload.wikimedia.org/wikipedia/commons/4/41/White_box_rounded.png" crossorigin="anonymous">
        
        <!-- Icons -->
        <img id="icon-github" src="https://cdn-icons-png.flaticon.com/512/733/733553.png" crossorigin="anonymous">
        <img id="icon-instagram" src="https://cdn-icons-png.flaticon.com/512/174/174855.png" crossorigin="anonymous">
        <img id="icon-linkedin" src="https://cdn-icons-png.flaticon.com/512/174/174857.png" crossorigin="anonymous">
        <img id="icon-gmail" src="https://cdn-icons-png.flaticon.com/512/5968/5968534.png" crossorigin="anonymous">
        
        <!-- Popup Images -->
        <img id="img-github" src="Github.png" crossorigin="anonymous">
        <img id="img-instagram" src="Instagram.jpeg" crossorigin="anonymous">
        <img id="img-linkedin" src="Linkedin.jpeg" crossorigin="anonymous">
        <img id="img-gmail" src="Gmail.png" crossorigin="anonymous">
      </a-assets>

      <!-- The AR Marker with Smoothing Enabled -->
      <a-marker type="pattern" url="pattern.patt" id="marker" emitevents="true" smooth="true" smoothCount="10" smoothTolerance="0.01" smoothThreshold="5">
        
        <!-- AR Container: Groups everything for popup animation -->
        <a-entity id="ar-container" scale="0 0 0" animation="property: scale; to: 1 1 1; dur: 1000; easing: easeOutElastic; startEvents: marker-found-anim">

          <!-- TOP RIGHT: Avatar & Name -->
          <a-entity position="1.8 0.1 -0.2">
            <!-- Avatar Circle -->
            <a-circle src="#avatar" position="0 0 0" rotation="-90 0 0" radius="0.6" class="clickable"></a-circle>
            
            <!-- Name Text -->
            <a-text value="Jourdan\nHutagalung" position="0.8 0 0" rotation="-90 0 0" scale="2.5 2.5 2.5" color="#FFFFFF" align="left"></a-text>
          </a-entity>

          <!-- MIDDLE LEFT: Portfolio Showcase (Video) -->
          <a-video src="#portfolio" position="0.5 0.1 1.4" rotation="-90 0 0" width="2" height="1.3" class="clickable" id="portfolio-btn"></a-video>

          <!-- MIDDLE RIGHT: 3D Animated GLB Model -->
          <a-entity gltf-model="url(Happy.glb)" animation-mixer scale="1.8 1.8 1.8" position="2.2 0.1 1.4" rotation="-90 0 0" class="clickable" id="happy-model"></a-entity>

          <!-- BOTTOM CENTER: 4 Circular Icons Row -->
          <a-entity position="1.8 0.1 3.0">
            <!-- Github -->
            <a-image src="#icon-github" position="-0.9 0 0" rotation="-90 0 0" width="0.45" height="0.45" class="clickable" id="github-btn"></a-image>
            
            <!-- Instagram -->
            <a-image src="#icon-instagram" position="-0.3 0 0" rotation="-90 0 0" width="0.45" height="0.45" class="clickable" id="instagram-btn"></a-image>
            
            <!-- LinkedIn -->
            <a-image src="#icon-linkedin" position="0.3 0 0" rotation="-90 0 0" width="0.45" height="0.45" class="clickable" id="linkedin-btn"></a-image>
            
            <!-- Gmail -->
            <a-image src="#icon-gmail" position="0.9 0 0" rotation="-90 0 0" width="0.45" height="0.45" class="clickable" id="gmail-btn"></a-image>

            <!-- POPUPS (Hidden by default scale 0) -->
            <!-- Github Popup (Laptop) -->
            <a-entity id="popup-github" position="-0.9 1.5 -1.0" rotation="-45 0 0" scale="0 0 0" animation="property: scale; to: 1 1 1; dur: 300; easing: easeOutBack; startEvents: pop-in" animation__out="property: scale; to: 0 0 0; dur: 200; easing: easeInBack; startEvents: pop-out">
              <a-triangle color="#FFFFFF" vertex-a="0 -0.8 0" vertex-b="-0.1 -0.5 0" vertex-c="0.1 -0.5 0"></a-triangle>
              <a-plane color="#FFFFFF" width="1.8" height="1.2" position="0 0 -0.02"></a-plane>
              <a-plane color="#222" width="1.7" height="1.1" position="0 0 -0.01"></a-plane>
              <a-plane color="#555" width="1.8" height="0.6" position="0 -0.55 0.2" rotation="-70 0 0"></a-plane>
              <a-image src="#img-github" width="1.6" height="0.9" position="0 0 0"></a-image>
            </a-entity>

            <!-- Instagram Popup (Phone) -->
            <a-entity id="popup-instagram" position="-0.3 1.5 -1.0" rotation="-45 0 0" scale="0 0 0" animation="property: scale; to: 1 1 1; dur: 300; easing: easeOutBack; startEvents: pop-in" animation__out="property: scale; to: 0 0 0; dur: 200; easing: easeInBack; startEvents: pop-out">
              <a-triangle color="#FFFFFF" vertex-a="0 -1.2 0" vertex-b="-0.1 -0.9 0" vertex-c="0.1 -0.9 0"></a-triangle>
              <a-plane color="#FFFFFF" width="1.1" height="2.0" position="0 0 -0.02"></a-plane>
              <a-plane color="#111" width="1.0" height="1.9" position="0 0 -0.01"></a-plane>
              <a-circle color="#333" radius="0.05" position="0 -0.85 0.01"></a-circle>
              <a-plane color="#333" width="0.2" height="0.02" position="0 0.85 0.01"></a-plane>
              <a-image src="#img-instagram" width="0.9" height="1.6" position="0 0 0"></a-image>
            </a-entity>

            <!-- LinkedIn Popup (Phone) -->
            <a-entity id="popup-linkedin" position="0.3 1.5 -1.0" rotation="-45 0 0" scale="0 0 0" animation="property: scale; to: 1 1 1; dur: 300; easing: easeOutBack; startEvents: pop-in" animation__out="property: scale; to: 0 0 0; dur: 200; easing: easeInBack; startEvents: pop-out">
              <a-triangle color="#FFFFFF" vertex-a="0 -1.2 0" vertex-b="-0.1 -0.9 0" vertex-c="0.1 -0.9 0"></a-triangle>
              <a-plane color="#FFFFFF" width="1.1" height="2.0" position="0 0 -0.02"></a-plane>
              <a-plane color="#111" width="1.0" height="1.9" position="0 0 -0.01"></a-plane>
              <a-circle color="#333" radius="0.05" position="0 -0.85 0.01"></a-circle>
              <a-plane color="#333" width="0.2" height="0.02" position="0 0.85 0.01"></a-plane>
              <a-image src="#img-linkedin" width="0.9" height="1.6" position="0 0 0"></a-image>
            </a-entity>

            <!-- Gmail Popup (Laptop) -->
            <a-entity id="popup-gmail" position="0.9 1.5 -1.0" rotation="-45 0 0" scale="0 0 0" animation="property: scale; to: 1 1 1; dur: 300; easing: easeOutBack; startEvents: pop-in" animation__out="property: scale; to: 0 0 0; dur: 200; easing: easeInBack; startEvents: pop-out">
              <a-triangle color="#FFFFFF" vertex-a="0 -0.8 0" vertex-b="-0.1 -0.5 0" vertex-c="0.1 -0.5 0"></a-triangle>
              <a-plane color="#FFFFFF" width="1.8" height="1.2" position="0 0 -0.02"></a-plane>
              <a-plane color="#222" width="1.7" height="1.1" position="0 0 -0.01"></a-plane>
              <a-plane color="#555" width="1.8" height="0.6" position="0 -0.55 0.2" rotation="-70 0 0"></a-plane>
              <a-image src="#img-gmail" width="1.6" height="0.9" position="0 0 0"></a-image>
            </a-entity>

          </a-entity>

        </a-entity>

      </a-marker>

      <!-- Camera with Raycaster for click detection -->
      <a-entity camera>
        <a-entity cursor="rayOrigin: mouse; fuse: false;" raycaster="objects: .clickable"></a-entity>
      </a-entity>
      
    </a-scene>

    <script src="script.js"></script>
  </body>
</html>
